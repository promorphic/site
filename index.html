<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promorphic — Frontier Technology R&D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020609;
      --cyan: #00d4ff;
      --purple: #7b2fff;
      --green: #00ffb4;
      --text: #cce8f4;
      --muted: #3a5a70;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.025) 2px,
        rgba(0,0,0,0.025) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Radial vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(2,6,9,0.7) 100%);
      pointer-events: none;
      z-index: 1;
    }

    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* ── Logo row ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .bracket {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      color: var(--cyan);
      opacity: 0.5;
    }

    .logo-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--cyan);
      opacity: 0.65;
      text-transform: uppercase;
    }

    /* ── Main title ── */
    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.6rem, 9vw, 6.5rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #fff;
      position: relative;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
      opacity: 0;
      animation: fadeUp 1s ease 0.55s forwards;
    }

    /* Glitch pseudo-elements */
    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    h1.glitch::before {
      animation: glitch1 0.35s ease forwards;
      color: var(--cyan);
      clip-path: polygon(0 15%, 100% 15%, 100% 38%, 0 38%);
      left: -2px;
    }

    h1.glitch::after {
      animation: glitch2 0.35s ease forwards;
      color: var(--purple);
      clip-path: polygon(0 58%, 100% 58%, 100% 78%, 0 78%);
      left: 2px;
    }

    @keyframes glitch1 {
      0%   { transform: translateX(0);   opacity: 0; }
      15%  { transform: translateX(-5px); opacity: 0.9; }
      35%  { transform: translateX(5px);  opacity: 0.9; }
      55%  { transform: translateX(-3px); opacity: 0.9; }
      75%  { transform: translateX(3px);  opacity: 0.9; }
      100% { transform: translateX(0);   opacity: 0; }
    }

    @keyframes glitch2 {
      0%   { transform: translateX(0);   opacity: 0; }
      15%  { transform: translateX(5px);  opacity: 0.9; }
      35%  { transform: translateX(-5px); opacity: 0.9; }
      55%  { transform: translateX(3px);  opacity: 0.9; }
      75%  { transform: translateX(-3px); opacity: 0.9; }
      100% { transform: translateX(0);   opacity: 0; }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      color: rgba(204, 232, 244, 0.7);
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
      max-width: 480px;
      line-height: 1.8;
      margin-top: 0.6rem;
    }

    /* ── Divider ── */
    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      margin: 2.2rem auto;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    /* ── Tags ── */
    .tags {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 1s ease 1.3s forwards;
    }

    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      border: 1px solid;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: transform 0.25s ease;
    }

    .tag::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tag:hover::before { opacity: 1; }
    .tag:hover { transform: translateY(-3px); }

    .tag-ai    { border-color: rgba(0,212,255,0.35); color: var(--cyan); }
    .tag-ai::before { background: rgba(0,212,255,0.07); }

    .tag-q     { border-color: rgba(123,47,255,0.35); color: #a78bff; }
    .tag-q::before { background: rgba(123,47,255,0.07); }

    .tag-bc    { border-color: rgba(0,255,180,0.3);  color: var(--green); }
    .tag-bc::before { background: rgba(0,255,180,0.06); }

    /* ── Contact ── */
    .contact {
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.6s forwards;
    }

    .contact a {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s, text-shadow 0.3s;
    }

    .contact a:hover {
      color: var(--cyan);
      text-shadow: 0 0 12px rgba(0,212,255,0.5);
    }

    /* ── Corner decorations ── */
    .corner {
      position: fixed;
      width: 36px;
      height: 36px;
      opacity: 0;
      animation: fadeIn 1s ease 1.9s forwards;
    }

    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: var(--cyan);
      opacity: 0.3;
    }

    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }

    .corner-tl { top: 22px; left: 22px; }
    .corner-tr { top: 22px; right: 22px; transform: scaleX(-1); }
    .corner-bl { bottom: 22px; left: 22px; transform: scaleY(-1); }
    .corner-br { bottom: 22px; right: 22px; transform: scale(-1); }

    /* ── Status indicator ── */
    .status {
      position: fixed;
      bottom: 26px;
      right: 26px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1s ease 2.1s forwards;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Shared animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- Corner brackets -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<main>
  <div class="logo-row">
    <span class="bracket">[</span>
    <span class="logo-label">PROMORPHIC.XYZ</span>
    <span class="bracket">]</span>
  </div>

  <h1 id="title" data-text="PROMORPHIC">PROMORPHIC</h1>

  <p class="tagline">
    R&amp;D firm specializing in frontier technology —<br>
    artificial intelligence, quantum computing &amp; blockchain.
  </p>

  <div class="divider"></div>

  <div class="tags">
    <span class="tag tag-ai">Artificial Intelligence</span>
    <span class="tag tag-q">Quantum Computing</span>
    <span class="tag tag-bc">Blockchain</span>
  </div>

  <div class="contact">
    <a href="mailto:founders@promorphic.xyz">founders@promorphic.xyz</a>
  </div>
</main>

<div class="status">
  <div class="dot"></div>
  System Online
</div>

<script>
// ────────────────────────────────────────────────────────────────
//  Particle / network background
// ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');

let W, H, particles;

const COUNT    = 90;
const MAX_DIST = 140;
const COLORS   = ['#00d4ff', '#7b2fff', '#00ffb4'];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

class Particle {
  constructor() { this.reset(true); }

  reset(initial = false) {
    this.x     = Math.random() * W;
    this.y     = initial ? Math.random() * H : (Math.random() < 0.5 ? -5 : H + 5);
    this.vx    = (Math.random() - 0.5) * 0.45;
    this.vy    = (Math.random() - 0.5) * 0.45;
    this.r     = Math.random() * 1.4 + 0.4;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.alpha = Math.random() * 0.5 + 0.4;
  }

  update() {
    // subtle mouse repel
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d < 110 && d > 0) {
      const f = (110 - d) / 110 * 0.7;
      this.x += (dx / d) * f;
      this.y += (dy / d) * f;
    }

    this.x += this.vx;
    this.y += this.vy;

    if (this.x < -10 || this.x > W + 10) this.vx *= -1;
    if (this.y < -10 || this.y > H + 10) this.vy *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function init() {
  resize();
  particles = Array.from({ length: COUNT }, () => new Particle());
}

function drawLines() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a  = particles[i], b = particles[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < MAX_DIST) {
        const alpha = (1 - d / MAX_DIST) * 0.22;
        const grad  = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        grad.addColorStop(0, a.color);
        grad.addColorStop(1, b.color);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = grad;
        ctx.globalAlpha = alpha;
        ctx.lineWidth   = 0.55;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  drawLines();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  resize();
  particles.forEach(p => {
    if (p.x > W) p.x = W - 10;
    if (p.y > H) p.y = H - 10;
  });
});

// ────────────────────────────────────────────────────────────────
//  Mouse tracking
// ────────────────────────────────────────────────────────────────
const mouse = { x: -999, y: -999 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

// ────────────────────────────────────────────────────────────────
//  Periodic glitch on title
// ────────────────────────────────────────────────────────────────
const title = document.getElementById('title');

function triggerGlitch() {
  title.classList.add('glitch');
  setTimeout(() => title.classList.remove('glitch'), 350);
  setTimeout(triggerGlitch, 3500 + Math.random() * 5000);
}

setTimeout(triggerGlitch, 2800);

// ────────────────────────────────────────────────────────────────
//  Boot
// ────────────────────────────────────────────────────────────────
init();
loop();
</script>
</body>
</html>
